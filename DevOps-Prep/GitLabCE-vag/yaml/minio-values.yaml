mode: standalone

rootUser: gitlabminio
rootPassword: gitlabminio-password

resources:
  requests:
    cpu: "250m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "2Gi"

nodeSelector:
  kubernetes.io/role: infra

persistence:
  size: 100Gi

service:
  type: ClusterIP
  port: 9000
consoleService:
  type: ClusterIP
  port: 9001

